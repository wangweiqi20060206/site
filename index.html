<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D河内塔 | 儿童益智游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏯 3D 河内塔</h1>

        <!-- 控制面板 -->
        <div class="control-panel">
            <div class="set-count">
                <label>圆盘数量：</label>
                <input type="range" id="diskSlider" min="3" max="8" value="5">
                <span id="diskNum">5</span>
            </div>
            <div class="move-count">走法步数：<span id="moveNum">0</span></div>
            <div class="btn-group">
                <button id="resetBtn">重置游戏</button>
                <button id="autoSolveBtn">自动解题</button>
            </div>
        </div>

        <!-- 游戏棋盘 3D容器 -->
        <div class="game-box">
            <div class="peg-container">
                <!-- 三根柱子 A B C -->
                <div class="peg" data-index="0"></div>
                <div class="peg" data-index="1"></div>
                <div class="peg" data-index="2"></div>
            </div>
        </div>

        <!-- 警告 & 胜利提示 -->
        <div id="warnText" class="warn-text"></div>
        <div id="winText" class="win-text">🎉 恭喜通关！</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
